<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CollegeDB | Scraper Engine</title>
    <!-- Tailwind CSS v4 CDN -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .terminal-scroll::-webkit-scrollbar { width: 6px; }
        .terminal-scroll::-webkit-scrollbar-track { background: transparent; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        
        #dropzone.dragover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center py-12 px-4 selection:bg-violet-500/30">

    <!-- Header -->
    <header class="w-full max-w-4xl mb-12 text-center animate-fade-in">
        <div class="inline-flex items-center justify-center p-3 mb-4 rounded-2xl bg-violet-500/10 text-violet-400 border border-violet-500/20">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        </div>
        <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-white mb-4">CollegeDB Engine</h1>
        <p class="text-slate-400 text-lg max-w-2xl mx-auto">Upload your raw CSV of college names to automatically resolve wikidata, scrape official websites, and extract transparent logos.</p>
    </header>

    <!-- Main Content -->
    <main class="w-full max-w-4xl grid grid-cols-1 gap-8">
        
        <!-- Upload Card -->
        <div class="glass rounded-3xl p-8 shadow-2xl shadow-black/50 relative overflow-hidden group">
            <div class="absolute inset-0 bg-gradient-to-br from-violet-500/5 to-transparent pointer-events-none"></div>
            
            <div id="dropzone" class="relative border-2 border-dashed border-slate-700/50 hover:border-violet-500/50 rounded-2xl p-12 text-center transition-all duration-300 cursor-pointer">
                <input type="file" id="fileInput" class="hidden" accept=".csv" />
                <div class="flex flex-col items-center justify-center space-y-4">
                    <div class="p-4 rounded-full bg-slate-800/50 text-slate-400 group-hover:text-violet-400 group-hover:bg-violet-500/10 transition-colors">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-slate-200">Upload colleges.csv</h3>
                        <p class="text-sm text-slate-500 mt-1">Drag and drop your file here, or click to browse</p>
                    </div>
                </div>
            </div>

            <!-- Action Area -->
            <div class="mt-6 flex flex-col items-center">
                <div id="selectedFile" class="text-sm text-violet-400 font-medium mb-4 hidden"></div>
                <button id="startBtn" class="hidden px-8 py-3 rounded-full bg-violet-600 hover:bg-violet-500 text-white font-semibold transition-all shadow-[0_0_20px_rgba(139,92,246,0.3)] hover:shadow-[0_0_30px_rgba(139,92,246,0.5)] active:scale-95">
                    Start Scraping Engine
                </button>
                <button id="downloadBtn" class="hidden px-8 py-3 rounded-full bg-emerald-600 hover:bg-emerald-500 text-white font-semibold transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)] hover:shadow-[0_0_30px_rgba(16,185,129,0.5)] active:scale-95">
                    Download Dataset (.zip)
                </button>
            </div>
        </div>

        <!-- Terminal Card -->
        <div class="glass rounded-3xl overflow-hidden shadow-2xl shadow-black/50 border border-slate-800">
            <div class="bg-slate-900/80 px-6 py-4 border-b border-slate-800 flex items-center justify-between">
                <div class="flex space-x-2">
                    <div class="w-3 h-3 rounded-full bg-rose-500/80"></div>
                    <div class="w-3 h-3 rounded-full bg-amber-500/80"></div>
                    <div class="w-3 h-3 rounded-full bg-emerald-500/80"></div>
                </div>
                <div class="text-xs font-mono text-slate-500">Live Output Logs</div>
            </div>
            <div class="bg-black/40 p-6 h-96 overflow-y-auto terminal-scroll" id="terminal">
                <div class="text-slate-500 font-mono text-sm leading-relaxed" id="terminal-content">
                    Ready and waiting for input...
                </div>
            </div>
        </div>

    </main>

    <script src="/static/script.js"></script>
</body>
</html>
